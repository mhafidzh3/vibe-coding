services:
  db:
    image: postgres:16-alpine
    container_name: vibe-coding-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: vibe-coding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d vibe-coding" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibe-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vibe-coding-api
    ports:
      - "9001:9001"
    environment:
      - DATABASE_URL=postgres://postgres:admin@db:5432/vibe-coding
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vibe-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: vibe-coding-web
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - vibe-net

networks:
  vibe-net:
    driver: bridge

volumes:
  postgres_data:
