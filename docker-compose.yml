version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: vibe-coding-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: vibe-coding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibe-coding"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
